<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フォーマット・フレームワーク集 | 総務ナビ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap');
  :root { --ink:#1a1a2e;--cream:#f5f0e8;--warm:#e8dcc8;--accent:#c4622d;--accent2:#2d6e8a;--gold:#c9a84c;--muted:#6b6560;--light-bg:#faf7f2;--border:#d6cec0; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--light-bg);color:var(--ink);line-height:1.7;}
  header{position:sticky;top:0;z-index:100;background:var(--ink);border-bottom:3px solid var(--gold);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-family:'Noto Serif JP',serif;font-weight:700;font-size:1.25rem;color:var(--cream);letter-spacing:0.08em;text-decoration:none;display:flex;align-items:center;gap:0.5rem;}
  .logo-badge{background:var(--gold);color:var(--ink);font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:2px;}
  .header-back{font-size:0.8rem;color:rgba(245,240,232,0.7);text-decoration:none;padding:0.4rem 0.9rem;border:1px solid rgba(245,240,232,0.2);border-radius:3px;transition:all 0.2s;}
  .header-back:hover{color:var(--cream);background:rgba(255,255,255,0.08);}
  .hero{background:var(--ink);padding:4rem 2rem 3.5rem;position:relative;overflow:hidden;}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 80%,rgba(196,98,45,0.1) 0%,transparent 65%);pointer-events:none;}
  .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,240,232,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,240,232,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
  .hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
  .hero-tag{display:inline-block;font-size:0.7rem;font-weight:700;letter-spacing:0.2em;color:var(--gold);border:1px solid rgba(201,168,76,0.4);padding:0.3rem 1rem;border-radius:2px;margin-bottom:1.5rem;}
  .hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:var(--cream);line-height:1.2;margin-bottom:1rem;}
  .hero-title em{font-style:italic;color:var(--gold);}
  .hero-lead{font-size:0.98rem;color:rgba(245,240,232,0.6);max-width:640px;line-height:1.85;font-weight:300;}
  .main{max-width:1100px;margin:0 auto;padding:4rem 2rem 6rem;}
  .section-label{font-size:0.65rem;font-weight:700;letter-spacing:0.25em;color:var(--accent);text-transform:uppercase;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;}
  .section-label::before{content:'';display:block;width:24px;height:1px;background:var(--accent);}
  .section-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:700;line-height:1.35;color:var(--ink);margin-bottom:1rem;}
  .formats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;border:1px solid rgba(26,26,46,0.1);border-radius:4px;overflow:hidden;background:rgba(26,26,46,0.08);}
  .format-item{padding:1.75rem;background:white;cursor:pointer;transition:background 0.2s;text-align:left;font-family:inherit;}
  .format-item:hover{background:var(--light-bg);}
  .format-icon{font-size:1.75rem;margin-bottom:0.75rem;display:block;}
  .format-name{font-family:'Noto Serif JP',serif;font-size:0.95rem;font-weight:700;color:var(--ink);margin-bottom:0.35rem;}
  .format-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;font-weight:300;}
  .format-dl{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.7rem;font-weight:700;color:var(--accent);margin-top:1rem;letter-spacing:0.1em;}
  footer{background:var(--ink);color:rgba(245,240,232,0.5);padding:2.5rem 2rem;text-align:center;}
  .footer-logo{font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:700;color:var(--cream);margin-bottom:0.5rem;}
  .footer-back a{font-size:0.8rem;color:rgba(245,240,232,0.5);text-decoration:none;border-bottom:1px solid rgba(245,240,232,0.2);padding-bottom:1px;}
  .footer-back a:hover{color:var(--cream);}
  .footer-copy{font-size:0.7rem;color:rgba(245,240,232,0.25);margin-top:1rem;}

  /* ===== SCROLL TO TOP ===== */
  .scroll-top {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 44px;
    height: 44px;
    background: var(--ink);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s, background 0.2s;
    z-index: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .scroll-top.visible { opacity: 1; transform: translateY(0); }
  .scroll-top:hover { background: var(--accent); border-color: var(--accent); }
  .scroll-top::before {
    content: '';
    border-style: solid;
    border-width: 0 6px 8px 6px;
    border-color: transparent transparent var(--gold) transparent;
    margin-bottom: 2px;
  }
  .scroll-top:hover::before { border-color: transparent transparent white transparent; }

</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">総務ナビ<span class="logo-badge">FORMAT</span></a>
  <a href="index.html" class="header-back">← トップに戻る</a>
</header>
<div class="hero">

  <div class="hero-inner">

    </button>
    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">
      <span class="format-icon">📊</span>
      <div class="format-name">総務KPI可視化シート</div>
      <div class="format-desc">見えにくい成果を定量化するための指標設計テンプレート。</div>
      <span class="format-dl">ダウンロード →</span>
    </button>
    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">
      <span class="format-icon">✅</span>
      <div class="format-name">入退社手続きチェックリスト</div>
      <div class="format-desc">入社・退社それぞれの手続き漏れを防ぐ完全版フロー。</div>
      <span class="format-dl">ダウンロード →</span>
    </button>
    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">
      <span class="format-icon">🏢</span>
      <div class="format-name">オフィス移転プロジェクト計画書</div>
      <div class="format-desc">スケジュール・ベンダー管理・社内周知まで一括管理できるフォーマット。</div>
      <span class="format-dl">ダウンロード →</span>
    </button>
    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">
      <span class="format-icon">🔐</span>
      <div class="format-name">印章管理規程サンプル</div>
      <div class="format-desc">使用申請フローから保管責任者の定め方まで。法的要件を満たした雛形。</div>
      <span class="format-dl">ダウンロード →</span>
    </button>
    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">
      <span class="format-icon">📈</span>
      <div class="format-name">総務バリューレポート雛形</div>

    <button class="format-item" onclick="alert('ダウンロードリンクはデモ版では無効です')">

    </button>
  </div>
</main>
<footer>
  <div class="footer-logo">総務ナビ</div>
  <div class="footer-back" style="margin:0.75rem 0;"><a href="index.html">← 総務ナビ トップへ</a></div>
  <div class="footer-copy">© 2025 総務ナビ. All rights reserved.</div>
</footer>

<!-- SCROLL TO TOP -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="ページトップへ"></button>


<!-- BACK TO TOP -->
<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="
  position:fixed;
  bottom:2rem;
  right:2rem;
  width:44px;
  height:44px;
  background:var(--ink);
  border:1px solid rgba(201,168,76,0.5);
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:500;
  opacity:0;
  transform:translateY(8px);
  transition:opacity 0.25s, transform 0.25s, background 0.2s;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M8 12V4M4 8l4-4 4 4" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
<script>
  (function(){
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function(){
      if (window.scrollY > 400) {
        btn.style.opacity = '1';
        btn.style.transform = 'translateY(0)';
      } else {
        btn.style.opacity = '0';
        btn.style.transform = 'translateY(8px)';
      }
    });
    btn.addEventListener('mouseenter', function(){ btn.style.background = '#2d3a5e'; });
    btn.addEventListener('mouseleave', function(){ btn.style.background = 'var(--ink)'; });
  })();
</script>


<!-- SCROLL TO TOP -->
<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="
  position:fixed;
  bottom:2rem;
  right:2rem;
  width:48px;
  height:48px;
  background:var(--ink);
  border:2px solid var(--gold);
  border-radius:50%;
  color:var(--gold);
  font-size:1.2rem;
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:500;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  transition:background 0.2s,transform 0.2s;
" onmouseover="this.style.background='var(--gold)';this.style.color='var(--ink)'" onmouseout="this.style.background='var(--ink)';this.style.color='var(--gold)'">
  ↑
</button>
<script>
  var scrollBtn = document.getElementById('scrollTopBtn');
  window.addEventListener('scroll', function() {
    scrollBtn.style.display = window.scrollY > 400 ? 'flex' : 'none';
  });
</script>

</body>
</html>
